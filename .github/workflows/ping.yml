name: Ping Site
on:
  schedule:
    - cron: "0 0 */15 * *"
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Acessar login
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" -A "Mozilla/5.0" --max-time 30 https://tabelas.infinityfree.me/)
          echo "Status HTTP: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "O site retornou um status diferente de 200!"
            exit 1
          fi
